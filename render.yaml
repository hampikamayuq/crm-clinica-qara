# Blueprint Render — deploy 1 clique. No painel: New > Blueprint, conecte o repo.
# No Render, use a DATABASE_URL interna do Postgres. Para .env local, use a URL externa.
# Preencha DATABASE_URL, OPENAI_API_KEY e BOOTSTRAP_PASSWORD no painel.
services:
  - type: web
    name: cliniqara-crm
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate && npm run prisma:seed
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: AI_PROVIDER
        value: openai
      - key: BOOTSTRAP_USERNAME
        value: admin
      - key: BOOTSTRAP_PASSWORD
        sync: false
      - key: NODE_VERSION
        value: "20"
