# Blueprint Render — deploy 1 clique. No painel: New > Blueprint, conecte o repo.
# Preencha DATABASE_URL e OPENAI_API_KEY (sync:false = colar no painel).
services:
  - type: web
    name: cliniqara-crm
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: AI_PROVIDER
        value: openai
      - key: ADMIN_API_KEY
        generateValue: true
      - key: NODE_VERSION
        value: "20"
